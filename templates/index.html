<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill-Bridge Career Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .skill-tag {
            transition: all 0.3s ease;
        }
        .skill-tag:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-lg">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="bg-indigo-600 rounded-lg p-2">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                        </svg>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-800">Skill-Bridge Career Navigator</h1>
                </div>
                <p class="text-gray-600">AI-Powered Career Path Analysis</p>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-8">
        <!-- Input Section -->
        <div class="bg-white rounded-xl shadow-xl p-8 mb-8 fade-in">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Get Started</h2>
            
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Your Resume / Skills
                    </label>
                    <textarea 
                        id="resumeInput" 
                        class="w-full h-32 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none"
                        placeholder="Paste your resume or list your skills here...&#10;Example: Python, JavaScript, React, SQL, AWS, Docker"
                    ></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Target Role
                    </label>
                    <select id="roleSelect" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                        <option value="">Select a role...</option>
                        <option value="Software Engineer">Software Engineer</option>
                        <option value="Data Scientist">Data Scientist</option>
                        <option value="Frontend Developer">Frontend Developer</option>
                        <option value="Cloud Engineer">Cloud Engineer</option>
                        <option value="Full Stack Developer">Full Stack Developer</option>
                    </select>
                    
                    <button 
                        id="analyzeBtn"
                        class="mt-4 w-full bg-indigo-600 text-white py-3 px-6 rounded-lg hover:bg-indigo-700 transition duration-200 font-semibold"
                    >
                        Analyze Skill Gap
                    </button>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="hidden bg-white rounded-xl shadow-xl p-8 mb-8 text-center">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent"></div>
            <p class="mt-4 text-gray-600">Analyzing your skills and generating insights...</p>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="hidden space-y-8">
            <!-- Gap Analysis -->
            <div class="bg-white rounded-xl shadow-xl p-8 fade-in">
                <h3 class="text-2xl font-bold text-gray-800 mb-6">Skill Gap Analysis</h3>
                <div id="gapAnalysisContent"></div>
            </div>

            <!-- Learning Roadmap -->
            <div class="bg-white rounded-xl shadow-xl p-8 fade-in">
                <h3 class="text-2xl font-bold text-gray-800 mb-6">Learning Roadmap</h3>
                <div id="roadmapContent"></div>
            </div>

            <!-- Interview Questions -->
            <div class="bg-white rounded-xl shadow-xl p-8 fade-in">
                <h3 class="text-2xl font-bold text-gray-800 mb-6">Mock Interview Questions</h3>
                <div id="interviewContent"></div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-6 mt-12">
        <div class="container mx-auto px-6 text-center">
            <p>&copy; 2024 Skill-Bridge Career Navigator. Built with AI for career development.</p>
        </div>
    </footer>

    <script>
        const app = {
            init() {
                this.bindEvents();
                this.loadRoles();
            },

            bindEvents() {
                document.getElementById('analyzeBtn').addEventListener('click', () => this.analyze());
                document.getElementById('resumeInput').addEventListener('input', (e) => this.updateCharCount(e.target));
            },

            updateCharCount(textarea) {
                const remaining = 2000 - textarea.value.length;
                // You can add a character counter display here if needed
            },

            async loadRoles() {
                try {
                    const response = await fetch('/api/roles');
                    const roles = await response.json();
                    const select = document.getElementById('roleSelect');
                    
                    roles.forEach(role => {
                        const option = document.createElement('option');
                        option.value = role;
                        option.textContent = role;
                        select.appendChild(option);
                    });
                } catch (error) {
                    console.error('Error loading roles:', error);
                }
            },

            async analyze() {
                const resume = document.getElementById('resumeInput').value.trim();
                const targetRole = document.getElementById('roleSelect').value;

                if (!resume || !targetRole) {
                    this.showNotification('Please fill in both your resume and select a target role.', 'error');
                    return;
                }

                this.showLoading();
                
                try {
                    const response = await fetch('/analyze', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            resume: resume,
                            targetRole: targetRole
                        })
                    });

                    const data = await response.json();
                    
                    if (data.error) {
                        this.showNotification(data.error, 'error');
                        return;
                    }

                    this.displayResults(data);
                    this.hideLoading();
                    document.getElementById('resultsSection').classList.remove('hidden');
                    
                    // Scroll to results
                    document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
                    
                } catch (error) {
                    this.showNotification('An error occurred during analysis. Please try again.', 'error');
                    this.hideLoading();
                }
            },

            showLoading() {
                document.getElementById('loadingState').classList.remove('hidden');
                document.getElementById('analyzeBtn').disabled = true;
                document.getElementById('analyzeBtn').textContent = 'Analyzing...';
            },

            hideLoading() {
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('analyzeBtn').disabled = false;
                document.getElementById('analyzeBtn').textContent = 'Analyze Skill Gap';
            },

            displayResults(data) {
                this.displayGapAnalysis(data.gap_analysis);
                this.displayRoadmap(data.learning_roadmap);
                this.displayInterviewQuestions(data.interview_questions);
            },

            displayGapAnalysis(gapAnalysis) {
                const container = document.getElementById('gapAnalysisContent');
                
                let html = `
                    <div class="mb-6">
                        <h4 class="text-lg font-semibold text-gray-700 mb-3">Your Current Skills</h4>
                        <div class="flex flex-wrap gap-2">
                            ${gapAnalysis.user_skills.map(skill => 
                                `<span class="skill-tag bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm font-medium">${skill}</span>`
                            ).join('')}
                        </div>
                    </div>
                `;

                if (gapAnalysis.missing_skills.length > 0) {
                    html += `
                        <div class="mb-6">
                            <h4 class="text-lg font-semibold text-gray-700 mb-3">Missing Skills (${gapAnalysis.missing_skills.length})</h4>
                            <div class="space-y-3">
                                ${gapAnalysis.missing_skills.map(skill => `
                                    <div class="flex items-center justify-between p-3 bg-red-50 rounded-lg">
                                        <div class="flex items-center space-x-3">
                                            <span class="skill-tag bg-red-100 text-red-800 px-3 py-1 rounded-full text-sm font-medium">${skill.skill}</span>
                                            <span class="text-sm text-gray-600">Found in ${skill.frequency} job postings</span>
                                        </div>
                                        <span class="px-2 py-1 text-xs font-medium rounded-full ${
                                            skill.priority === 'High' ? 'bg-red-200 text-red-800' : 'bg-yellow-200 text-yellow-800'
                                        }">${skill.priority} Priority</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    html += '<div class="p-4 bg-green-50 rounded-lg"><p class="text-green-800">Great! You have all the key skills for this role.</p></div>';
                }

                html += `<p class="text-sm text-gray-600 mt-4">Analysis based on ${gapAnalysis.total_jobs_analyzed} job postings</p>`;
                
                container.innerHTML = html;
            },

            displayRoadmap(roadmap) {
                const container = document.getElementById('roadmapContent');
                
                if (roadmap.length === 0) {
                    container.innerHTML = '<p class="text-gray-600">No learning roadmap needed - you have the key skills!</p>';
                    return;
                }

                let html = '<div class="space-y-6">';
                
                roadmap.forEach((item, index) => {
                    html += `
                        <div class="border-l-4 border-indigo-500 pl-6">
                            <div class="flex items-center justify-between mb-3">
                                <h5 class="font-semibold text-gray-800">${item.skill}</h5>
                                <div class="flex items-center space-x-2">
                                    <span class="text-sm text-gray-600">${item.estimated_time}</span>
                                    <span class="px-2 py-1 text-xs font-medium rounded-full ${
                                        item.priority === 'High' ? 'bg-red-200 text-red-800' : 'bg-yellow-200 text-yellow-800'
                                    }">${item.priority} Priority</span>
                                </div>
                            </div>
                            <div class="space-y-2">
                                ${item.resources.map(resource => `
                                    <div class="bg-gray-50 p-3 rounded-lg">
                                        <div class="flex items-center justify-between">
                                            <div>
                                                <h6 class="font-medium text-gray-800">${resource.name}</h6>
                                                <p class="text-sm text-gray-600">${resource.provider} • ${resource.duration}</p>
                                            </div>
                                            <span class="px-2 py-1 text-xs font-medium rounded-full ${
                                                resource.type === 'free' ? 'bg-green-100 text-green-800' : 'bg-blue-100 text-blue-800'
                                            }">${resource.type}</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
                
                html += '</div>';
                container.innerHTML = html;
            },

            displayInterviewQuestions(questions) {
                const container = document.getElementById('interviewContent');
                
                let html = '<div class="space-y-4">';
                
                questions.forEach((question, index) => {
                    html += `
                        <div class="bg-gradient-to-r from-indigo-50 to-blue-50 p-4 rounded-lg border-l-4 border-indigo-500">
                            <div class="flex items-start space-x-3">
                                <span class="flex-shrink-0 w-8 h-8 bg-indigo-600 text-white rounded-full flex items-center justify-center font-semibold text-sm">${index + 1}</span>
                                <p class="text-gray-800">${question}</p>
                            </div>
                        </div>
                    `;
                });
                
                html += '</div>';
                container.innerHTML = html;
            },

            showNotification(message, type) {
                // Simple notification - you could enhance this with a toast library
                alert(message);
            }
        };

        // Initialize app when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
